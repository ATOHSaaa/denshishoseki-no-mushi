name: Generate daily Kindle deals

on:
  schedule:
    # 00:05 Asia/Tokyo (= 15:05 UTC)
    - cron: '5 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-deals
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate daily deals post
        run: npm run generate:daily-deals
        env:
          AMAZON_CREDENTIAL_ID: ${{ secrets.AMAZON_CREATORS_API_ACCESS_KEY }}
          AMAZON_CREDENTIAL_SECRET: ${{ secrets.AMAZON_CREATORS_API_SECRET_KEY }}
          AMAZON_CREATORS_API_PARTNER_TAG: ${{ vars.PUBLIC_AMAZON_ASSOCIATE_TAG }}
          PUBLIC_AMAZON_ASSOCIATE_TAG: ${{ vars.PUBLIC_AMAZON_ASSOCIATE_TAG }}

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- src/content/posts public/images/posts; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/posts public/images/posts
          git commit -m "Add Kindle daily deals for $(TZ=Asia/Tokyo date +%Y-%m-%d)"
          git push origin HEAD
